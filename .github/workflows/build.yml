#file: noinspection SpellCheckingInspection
name: Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    uses: gebinee/.github/.github/workflows/tauri-build.yml@main
    with:
      tag_name: ${{ inputs.tag_name }}
    secrets: inherit
